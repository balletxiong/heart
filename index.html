<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>一份特别的礼物 🎁</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #0a0a0a; /* 深色背景更有星空感 */
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 10;
            text-align: center;
            pointer-events: none; /* 防止遮挡画布点击 */
        }

        .heart-box {
            position: relative;
            display: inline-block;
            pointer-events: auto; /* 只有心形可以点 */
            cursor: pointer;
            transition: transform 0.3s;
        }

        .heart-box:hover {
            transform: scale(1.1);
        }

        /* 核心爱心样式 */
        .heart {
            width: 120px;
            height: 120px;
            background: #ff4d6d;
            position: relative;
            transform: rotate(-45deg);
            box-shadow: 0 0 40px #ff4d6d;
            animation: pulse 1.5s infinite;
        }

        .heart::before, .heart::after {
            content: '';
            width: 120px;
            height: 120px;
            background: #ff4d6d;
            border-radius: 50%;
            position: absolute;
        }

        .heart::before { top: -60px; left: 0; }
        .heart::after { left: 60px; top: 0; }

        @keyframes pulse {
            0% { transform: rotate(-45deg) scale(1); box-shadow: 0 0 20px #ff4d6d; }
            50% { transform: rotate(-45deg) scale(1.1); box-shadow: 0 0 50px #ff758c; }
            100% { transform: rotate(-45deg) scale(1); box-shadow: 0 0 20px #ff4d6d; }
        }

        .text-content {
            margin-top: 80px;
            color: white;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        h1 { font-size: 28px; margin-bottom: 10px; color: #ff85a1; }
        p { font-size: 18px; opacity: 0.8; letter-spacing: 2px; }

        /* 点击后的文字淡入 */
        #secret-msg {
            margin-top: 20px;
            font-size: 22px;
            color: #ff4d6d;
            font-weight: bold;
            opacity: 0;
            transition: opacity 1s;
        }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="container">
    <div class="heart-box" id="heartBtn">
        <div class="heart"></div>
    </div>
    <div class="text-content">
        <h1>Hey, 这里有个心愿</h1>
        <p id="hint">点一下这颗心，把它拆开</p>
        <div id="secret-msg"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const heartBtn = document.getElementById('heartBtn');
    const secretMsg = document.getElementById('secret-msg');
    const hint = document.getElementById('hint');

    let particles = [];
    const colors = ['#ff4d6d', '#ff758c', '#ff85a1', '#f7cad0', '#ffffff'];

    // 设置画布大小
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Particle {
        constructor(x, y, isHeart = false) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 5 + 2;
            this.speedX = (Math.random() - 0.5) * 8;
            this.speedY = (Math.random() - 0.5) * 8;
            this.color = colors[Math.floor(Math.random() * colors.length)];
            this.life = 1;
            this.decay = Math.random() * 0.02 + 0.01;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.globalAlpha = this.life;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
        }
        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.life -= this.decay;
        }
    }

    function createExplosion(x, y) {
        for (let i = 0; i < 100; i++) {
            particles.push(new Particle(x, y));
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 背景微光粒子
        if (Math.random() > 0.9) {
            particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height));
        }

        for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].life <= 0) {
                particles.splice(i, 1);
                i--;
            }
        }
        requestAnimationFrame(animate);
    }
    animate();

    const messages = [
        "其实我观察你很久了...",
        "每次看到你，心跳都会漏掉半拍",
        "所以这颗心，早就偏向你了 ❤️"
    ];
    let msgIndex = 0;

    heartBtn.onclick = function(e) {
        // 粒子爆炸
        createExplosion(e.clientX, e.clientY);
        
        // 震动反馈 (手机端)
        if (navigator.vibrate) navigator.vibrate(50);

        // 切换文案
        if (msgIndex < messages.length) {
            hint.style.display = 'none';
            secretMsg.style.opacity = 0;
            setTimeout(() => {
                secretMsg.innerText = messages[msgIndex];
                secretMsg.style.opacity = 1;
                msgIndex++;
            }, 200);
        }
    };
</script>

</body>
</html>
