<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>遇见你，是银河赠予我的糖 ✨</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(ellipse at bottom, #1B2735 0%, #090A0F 100%);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas { position: absolute; top: 0; left: 0; }

        .container {
            position: relative;
            z-index: 100;
            text-align: center;
            user-select: none;
        }

        /* 霓虹爱心 */
        .heart-wrapper {
            cursor: pointer;
            transition: transform 0.3s;
            filter: drop-shadow(0 0 15px #ff4d6d);
        }
        .heart-wrapper:active { transform: scale(0.9); }

        .heart {
            width: 100px;
            height: 100px;
            background: #ff4d6d;
            position: relative;
            transform: rotate(-45deg);
            animation: beat 1.2s infinite;
        }
        .heart::before, .heart::after {
            content: '';
            width: 100px;
            height: 100px;
            background: #ff4d6d;
            border-radius: 50%;
            position: absolute;
        }
        .heart::before { top: -50px; left: 0; }
        .heart::after { left: 50px; top: 0; }

        @keyframes beat {
            0%, 100% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.15); }
        }

        .text-area {
            margin-top: 60px;
            min-height: 100px;
        }

        #title {
            font-size: 24px;
            color: #ffb3c1;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        #typed-text {
            font-size: 20px;
            color: #fff;
            line-height: 1.6;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* 隐藏音乐播放器 */
        #bgm { display: none; }
    </style>
</head>
<body>

<canvas id="canvas"></canvas>
<audio id="bgm" loop src="https://music.163.com/song/media/outer/url?id=1411358329.mp3"></audio>

<div class="container">
    <div class="heart-wrapper" id="heartBtn">
        <div class="heart"></div>
    </div>
    <div class="text-area">
        <div id="title">点击这颗心，听听它的声音</div>
        <div id="typed-text"></div>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const heartBtn = document.getElementById('heartBtn');
    const typedText = document.getElementById('typed-text');
    const title = document.getElementById('title');
    const bgm = document.getElementById('bgm');

    let particles = [];
    let hearts = [];
    let stars = [];

    function init() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        // 初始化星星
        for(let i=0; i<100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                opacity: Math.random()
            });
        }
    }
    window.onresize = init;
    init();

    // 粒子类
    class Particle {
        constructor(x, y) {
            this.x = x; this.y = y;
            this.vx = (Math.random() - 0.5) * 10;
            this.vy = (Math.random() - 0.5) * 10;
            this.life = 1;
            this.color = `hsla(${Math.random()*20 + 340}, 100%, 70%, `;
        }
        update() {
            this.x += this.vx; this.y += this.vy; this.life -= 0.02;
        }
        draw() {
            ctx.fillStyle = this.color + this.life + ')';
            ctx.beginPath();
            ctx.arc(this.x, this.y, 2, 0, Math.PI*2);
            ctx.fill();
        }
    }

    // 打字机效果
    const script = [
        "在这个无趣的世界里...",
        "你是我唯一的星光 ✨",
        "我想陪你看遍所有的流星",
        "也想把这颗心，完完整整地交给你 ❤️"
    ];
    let lineIndex = 0;

    function typeWriter(text, i, fnCallback) {
        if (i < text.length) {
            typedText.innerHTML = text.substring(0, i+1) +'<span aria-hidden="true">|</span>';
            setTimeout(() => typeWriter(text, i + 1, fnCallback), 150);
        } else if (typeof fnCallback == 'function') {
            setTimeout(fnCallback, 1500);
        }
    }

    function startTyping() {
        if (lineIndex < script.length) {
            typeWriter(script[lineIndex], 0, () => {
                lineIndex++;
                startTyping();
            });
        }
    }

    // 动画循环
    function animate() {
        ctx.fillStyle = 'rgba(9, 10, 15, 0.2)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 画星星
        stars.forEach(s => {
            ctx.fillStyle = `rgba(255,255,255,${Math.sin(Date.now()*0.001 + s.x)})`;
            ctx.fillRect(s.x, s.y, s.size, s.size);
        });

        particles.forEach((p, i) => {
            p.update(); p.draw();
            if(p.life <= 0) particles.splice(i, 1);
        });

        requestAnimationFrame(animate);
    }
    animate();

    // 点击事件
    heartBtn.onclick = function(e) {
        // 播放音乐
        bgm.play();
        title.style.opacity = '0';
        
        // 爆炸特效
        for(let i=0; i<50; i++) particles.push(new Particle(e.clientX, e.clientY));

        // 开始表白
        if(lineIndex === 0) startTyping();
        
        // 手机震动
        if (navigator.vibrate) navigator.vibrate(100);
    };
</script>
</body>
</html>
